name: Deploy to GitHub Pages

on:
  push:
    # only the default branch — GitHub Pages' environment only deploys from it,
    # and including other branches would let doomed runs cancel the good one.
    branches: [claude/practical-carson-xaxwnx]
  workflow_dispatch:

# Allow this workflow to publish to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build (Vite)
        env:
          # Project site is served at https://<user>.github.io/objetivo/
          BASE_PATH: /objetivo/
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
